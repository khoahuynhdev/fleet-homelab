apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-csi-provider
  namespace: csi-secrets
spec:
  interval: 30m
  chart:
    spec:
      chart: vault
      version: "0.32.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  install:
    createNamespace: false
  values:
    server:
      enabled: false
    injector:
      enabled: false
    csi:
      enabled: true
      agent:
        enabled: false
