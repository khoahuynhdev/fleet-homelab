apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
  labels:
    app: vaultwarden
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      serviceAccountName: vaultwarden
      containers:
        - name: vaultwarden
          image: vaultwarden/server:1.35.4
          ports:
            - name: http
              containerPort: 80
          env:
            - name: DOMAIN
              value: "https://vault.khoahuynh.dev"
            - name: SIGNUPS_ALLOWED
              value: "false"
            - name: SHOW_PASSWORD_HINT
              value: "false"
            - name: INVITATIONS_ALLOWED
              value: "false"
            - name: ORG_CREATION_USERS
              value: "none"
            - name: IP_HEADER
              value: "Cf-Connecting-Ip"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-synced
                  key: admin-token
          volumeMounts:
            - name: data
              mountPath: /data
            - name: secrets
              mountPath: /mnt/secrets
              readOnly: true
            - name: vault-ca
              mountPath: /etc/vault-ca
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: vaultwarden-secrets
        - name: vault-ca
          configMap:
            name: vault-ca-cert
